<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Engine - Advanced Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #00FF75;
            font-family: "Courier New", Consolas, monospace;
            min-height: 100vh;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00FF75;
        }
        
        .upload-zone {
            border: 2px dashed #00FF75;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-zone:hover, .upload-zone.drag-over {
            background: rgba(0, 255, 117, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 117, 0.3);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        select, button, input[type="range"] {
            background: #000;
            border: 1px solid #00FF75;
            color: #00FF75;
            padding: 8px;
            font-family: inherit;
            cursor: pointer;
        }
        
        button {
            background: #00FF75;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        button:hover {
            box-shadow: 0 0 10px #00FF75;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .slider-row span {
            font-size: 12px;
            min-width: 40px;
        }
        
        .output-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        
        .panel {
            border: 1px solid #00FF75;
            padding: 15px;
            background: rgba(0, 255, 117, 0.05);
            overflow: hidden;
        }
        
        .panel h3 {
            margin-bottom: 10px;
            border-bottom: 1px solid #00FF75;
            padding-bottom: 5px;
        }
        
        #originalImage {
            max-width: 100%;
            max-height: 400px;
            display: block;
            margin: 0 auto;
        }
        
        #asciiOutput {
            font-family: "Courier New", Consolas, monospace;
            white-space: pre;
            overflow: auto;
            max-height: 400px;
            color: #00FF75;
            text-shadow: 0 0 2px #00FF75;
            line-height: 1;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .error {
            color: #ff0040;
            text-align: center;
            padding: 20px;
            border: 1px solid #ff0040;
            margin-top: 20px;
        }
        
        .info-box {
            background: rgba(0, 255, 117, 0.1);
            border: 1px solid #00FF75;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            .output-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>ASCII ART ENGINE // ADVANCED TEST INTERFACE</h1>
    
    <div class="info-box>
        <strong>NEW:</strong> Extended ramps (70 levels), Unicode blocks (░▒▓█), Structure matching
    </div>
    
    <div class="upload-zone" id="uploadZone">
        <p>DROP IMAGE HERE OR CLICK TO UPLOAD</p>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.7;">PNG, JPG, GIF supported</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    
    <div class="controls">
        <div class="control-group">
            <label>Resolution</label>
            <select id="resolutionMode">
                <option value="thumbnail">Thumbnail (32 chars)</option>
                <option value="standard">Standard (80 chars)</option>
                <option value="detailed">Detailed (120 chars)</option>
                <option value="highDetail" selected>High Detail (160 chars)</option>
                <option value="ultra">Ultra (240 chars - SLOW)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Character Set</label>
            <select id="charSetMode">
                <option value="standardAscii">Standard ASCII (10 levels)</option>
                <option value="extendedDensity" selected>Extended Density (70 levels)</option>
                <option value="ultraDensity">Ultra Density (95 levels)</option>
                <option value="blockElements">Unicode Blocks (18 levels)</option>
                <option value="mixedExtended">Mixed Extended + Blocks</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Edge Detection</label>
            <select id="edgeMode">
                <option value="none">Tone Only (No edges)</option>
                <option value="edgesOnly">Edges Only</option>
                <option value="hybrid" selected>Hybrid (Edges + Tone)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>Dithering</label>
            <select id="ditherMode">
                <option value="none">None</option>
                <option value="bayer" selected>Bayer Ordered (Retro)</option>
            </select>
        </div>
        
        <div class="slider-group">
            <label>Structure Strength</label>
            <div class="slider-row">
                <input type="range" id="structureStrength" min="0" max="100" value="70">
                <span id="structureValue">70%</span>
            </div>
        </div>
        
        <div class="control-group">
            <label>Unicode Support</label>
            <select id="useUnicode">
                <option value="true" selected>Enabled (Box drawing)</option>
                <option value="false">ASCII Only</option>
            </select>
        </div>
    </div>
    
    <button id="convertBtn" disabled>CONVERT TO ASCII</button>
    
    <div id="status"></div>
    
    <div class="output-container" id="outputContainer" style="display: none;">
        <div class="panel">
            <h3>ORIGINAL</h3>
            <img id="originalImage" alt="Original">
        </div>
        <div class="panel">
            <h3>ASCII OUTPUT</h3>
            <div id="asciiOutput"></div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');
        const originalImage = document.getElementById('originalImage');
        const asciiOutput = document.getElementById('asciiOutput');
        const outputContainer = document.getElementById('outputContainer');
        const status = document.getElementById('status');
        const structureSlider = document.getElementById('structureStrength');
        const structureValue = document.getElementById('structureValue');
        
        let currentFile = null;
        
        structureSlider.addEventListener('input', (e) => {
            structureValue.textContent = e.target.value + '%';
        });
        
        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('drag-over');
        });
        
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('drag-over');
        });
        
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('Please upload an image file');
                return;
            }
            
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                convertBtn.disabled = false;
                outputContainer.style.display = 'none';
                status.innerHTML = `<p style="text-align: center; color: #00FF75;">Ready: ${file.name} (${(file.size/1024).toFixed(1)} KB)</p>`;
            };
            reader.readAsDataURL(file);
        }
        
        convertBtn.addEventListener('click', async () => {
            if (!currentFile) return;
            
            convertBtn.disabled = true;
            outputContainer.style.display = 'none';
            status.innerHTML = '<div class="loading">CONVERTING WITH ADVANCED ALGORITHMS...</div>';
            
            const formData = new FormData();
            formData.append('image', currentFile);
            formData.append('resolutionMode', document.getElementById('resolutionMode').value);
            formData.append('charSetMode', document.getElementById('charSetMode').value);
            formData.append('edgeMode', document.getElementById('edgeMode').value);
            formData.append('ditherMode', document.getElementById('ditherMode').value);
            formData.append('structureStrength', document.getElementById('structureStrength').value / 100);
            formData.append('useUnicode', document.getElementById('useUnicode').value);
            
            try {
                const response = await fetch('/api/ascii/convert', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Conversion failed');
                }
                
                const result = await response.json();
                
                asciiOutput.textContent = result.asciiData;
                
                // Adjust font size based on resolution
                const width = result.widthChars;
                let fontSize = '8px';
                if (width <= 32) fontSize = '16px';
                else if (width <= 80) fontSize = '12px';
                else if (width <= 120) fontSize = '10px';
                else if (width <= 160) fontSize = '8px';
                else fontSize = '6px';
                
                asciiOutput.style.fontSize = fontSize;
                outputContainer.style.display = 'grid';
                status.innerHTML = `<p style="text-align: center; color: #00FF75;">Done: ${result.widthChars}x${result.heightChars} characters in ${result.metadata.durationMs?.toFixed(2) || '?'}ms | Ramp: ${result.metadata.rampLength} levels</p>`;
                
            } catch (err) {
                showError(err.message);
            } finally {
                convertBtn.disabled = false;
            }
        });
        
        function showError(msg) {
            status.innerHTML = `<div class="error">ERROR: ${msg}</div>`;
        }
    </script>
</body>
</html>
