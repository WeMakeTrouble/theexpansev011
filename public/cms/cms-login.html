<!DOCTYPE html>
<!--
 ============================================================================
 The Expanse v010 — CMS Admin Login
 File: public/cms/cms-login.html
 ============================================================================

 WHAT THIS FILE IS:
 ---------------------------------------------------------------------------
 Authentication gateway for the CMS admin terminal. Admin users enter
 credentials, POST to /auth/login, verify access_level >= 11, and
 redirect to the three-column CMS admin interface on success.

 This is separate from the COTW user login (public/cotw/cotw-login.html)
 because admin access requires elevated privileges and redirects to a
 different destination.

 FLOW:
 ---------------------------------------------------------------------------
 1. Page load -> GET /auth/check -> redirect to /cms/ if already admin
 2. User enters username + password
 3. Form submit -> POST /auth/login (via cmsLoginHandler.js)
 4. Response checked: access_level >= 11 required
 5. Success -> redirect to /cms/
 6. Failure -> error message (wrong credentials or insufficient privileges)

 ARCHITECTURE:
 ---------------------------------------------------------------------------
 - Vanilla JavaScript ES module, no frameworks
 - Terminal aesthetic (#00ff75 on black, cold-war instrument design)
 - Reuses cms-styles.css and cotw-login.css for consistent styling
 - No inline scripts or styles (hardened CSP)
 - ARIA landmarks, WCAG 2.2 AA+ compliant
 - ES module loaded via cmsLoginHandler.js

 DOM IDS USED BY JAVASCRIPT:
 ---------------------------------------------------------------------------
 login-form          Form element (submit event listener)
 login-username      Username text input
 login-password      Password text input
 login-submit        Submit button (loading state management)
 error-message       Error display region (aria-live="assertive")
 skip-link           Accessibility skip-to-content link

 SECURITY:
 ---------------------------------------------------------------------------
 Content-Security-Policy enforced via meta tag:
   default-src 'self'; script-src 'self'; style-src 'self';
   connect-src 'self'; img-src 'self' data:; font-src 'self';
   object-src 'none'; base-uri 'self'; frame-ancestors 'none';
   form-action 'self'
 Referrer-Policy: strict-origin-when-cross-origin
 No inline scripts or styles
 Input autocomplete disabled, spellcheck disabled

 DEPENDENCIES:
 ---------------------------------------------------------------------------
 css/cms-styles.css          Shared terminal aesthetic
 ../cotw/css/cotw-login.css  Login form specific styles
 js/cmsLoginHandler.js       Login form controller (admin-specific)

 RELATED FILES:
 ---------------------------------------------------------------------------
 public/cotw/cotw-login.html       COTW user login (redirects to dossier)
 public/cotw/js/loginHandler.js    COTW login handler (user-level)
 public/cms/index.html             CMS admin terminal (redirect target)
 backend/routes/auth.js            Auth endpoints (/auth/login, /auth/check)

 ============================================================================
 Project: The Expanse v010
 Author: James (Project Manager)
 Created: February 23, 2026
 ============================================================================
-->
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self';
        style-src 'self';
        connect-src 'self';
        img-src 'self' data:;
        font-src 'self';
        object-src 'none';
        base-uri 'self';
        frame-ancestors 'none';
        form-action 'self';
    ">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="The Expanse v010 — CMS Admin Authentication">

    <title>The Expanse — Admin Login</title>

    <!-- Resource hints -->
    <link rel="preload" href="css/cms-styles.css" as="style">
    <link rel="modulepreload" href="js/cmsLoginHandler.js">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/cms-styles.css">
    <link rel="stylesheet" href="../cotw/css/cotw-login.css">
</head>
<body>
    <!-- Skip to main content for keyboard / screen reader users -->
    <a href="#login-username" class="sr-only" id="skip-link">Skip to login</a>

    <noscript>
        <div style="background:#000;color:#00ff75;padding:40px;font-family:monospace;text-align:center;">
            <p>The Expanse Admin Terminal requires JavaScript to operate.</p>
            <p>Please enable JavaScript and reload the page.</p>
        </div>
    </noscript>

    <main class="login-page" aria-label="Admin Authentication">
        <div class="login-container" data-testid="login-container">

            <header class="login-header">
                <h1 class="login-title">Admin Terminal</h1>
                <p class="login-subtitle">CMS Authentication</p>
            </header>

            <form
                id="login-form"
                class="login-form"
                data-testid="login-form"
                novalidate
            >
                <div class="login-field">
                    <label for="login-username" class="login-label">Username</label>
                    <input
                        type="text"
                        id="login-username"
                        class="login-input"
                        data-testid="login-username"
                        placeholder="USERNAME"
                        autocomplete="off"
                        spellcheck="false"
                        autofocus
                        required
                        aria-required="true"
                        aria-describedby="error-message"
                    >
                </div>

                <div class="login-field">
                    <label for="login-password" class="login-label">Password</label>
                    <input
                        type="password"
                        id="login-password"
                        class="login-input"
                        data-testid="login-password"
                        placeholder="PASSWORD"
                        autocomplete="off"
                        required
                        aria-required="true"
                        aria-describedby="error-message"
                    >
                </div>

                <div
                    id="error-message"
                    class="login-error"
                    role="alert"
                    aria-live="assertive"
                    aria-hidden="true"
                    data-testid="login-error"
                ></div>

                <button
                    type="submit"
                    class="login-submit"
                    data-testid="login-submit"
                    aria-busy="false"
                >AUTHENTICATE</button>
            </form>

        </div>
    </main>

    <!-- CMS Login JS module -->
    <script type="module" src="js/cmsLoginHandler.js" fetchpriority="high"></script>

</body>
</html>
